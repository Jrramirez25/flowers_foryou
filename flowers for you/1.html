<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers for Cheska</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    font-family:'Comic Sans MS', cursive;
}

.container{
    text-align:center;
}

.kitty{
    font-size:100px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    50%{
        transform:translateY(-15px);
    }
}

h1{
    color:#ff4f8b;
    margin-bottom:30px;
    text-shadow:2px 2px white;
}

.btn{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

#yesBtn{
    background:#ff6fa5;
    color:white;
    position:absolute;
}

#noBtn{
    background:white;
    color:#ff6fa5;
    margin-left:180px;
}

#result{
    display:none;
    margin-top:30px;
    animation:pop .8s ease;
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

.rose{
    font-size:120px;
}

.message{
    color:#ff4f8b;
    font-size:30px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <div class="kitty">🐱🎀</div>

    <h1> Sorry na flowers for you, Cheska? 🌸</h1>

    <button id="yesBtn" class="btn">Yes 💖</button>
    <button id="noBtn" class="btn">No 🙈</button>

    <div id="result">
        <div class="rose">🌹🌹🌹</div>
        <div class="message">
            These roses are for you, Cheska! ❤️
        </div>
    </div>

</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const result = document.getElementById("result");

let catches = 0;

// Initial position
yesBtn.style.left = "45%";
yesBtn.style.top = "60%";

yesBtn.addEventListener("click", () => {

    catches++;

    // After 6 catches show roses
    if(catches >= 6){
        yesBtn.style.display = "none";
        document.getElementById("noBtn").style.display = "none";
        result.style.display = "block";
        return;
    }

    // Move button to random location
    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 80;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    yesBtn.style.left = x + "px";
    yesBtn.style.top = y + "px";
});

// No button also becomes Yes 😆
document.getElementById("noBtn").addEventListener("click", () => {
    alert("Oops! Only YES is allowed 😘🌸");
});
</script>

</body>
</html>
